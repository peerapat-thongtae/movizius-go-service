name: Sync movie popularity

on:
  schedule:
    # 09:00 UTC daily — TMDB publishes the daily export around 08:00 UTC.
    - cron: "0 9 * * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Reconcile popularity from TMDB export
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: go run ./cmd/sync-popularity
