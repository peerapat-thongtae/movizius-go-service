name: Sync tv popularity

on:
  schedule:
    # 09:30 UTC daily — offset from the movie job to spread DB load.
    - cron: "30 9 * * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Reconcile tv popularity from TMDB export
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          TMDB_API_READ_ACCESS_TOKEN: ${{ secrets.TMDB_API_READ_ACCESS_TOKEN }}
        run: go run ./cmd/sync-popularity tv
