host: localhost:8080
info:
  contact:
    email: peera.thongtae@gmail.com
    name: Movizius
  description: Movie & TV Series tracking backend.
  title: Movizius API
  version: "1.0"
paths:
  /health:
    get:
      description: Returns service status.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_health.Status'
      summary: Health check
      tags:
      - health
  /movie/states:
    get:
      description: Returns all movie watchlist/history records for the authenticated
        user.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_peera_movizius-go-service_internal_shared_response.Page-internal_movie_MovieUser'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List movie states
      tags:
      - movies
  /notification/devices:
    post:
      consumes:
      - application/json
      description: 'Registers or updates a device FCM token for the authenticated
        user. Platform must be one of: ios, android, web.'
      parameters:
      - description: FCM token and platform
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_notification.RegisterDeviceRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Register device token
      tags:
      - notification
  /tv/states:
    get:
      description: Returns all TV series watchlist/history records for the authenticated
        user.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_peera_movizius-go-service_internal_shared_response.Page-internal_tv_TVState'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List TV states
      tags:
      - tv
securityDefinitions:
  BearerAuth:
    description: 'JWT bearer token — format: "Bearer <token>"'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
