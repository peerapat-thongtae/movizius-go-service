info:
  contact: {}
paths:
  /health:
    get:
      description: Returns service status.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_health.Status'
      summary: Health check
      tags:
      - health
  /movie:
    post:
      consumes:
      - application/json
      description: Set watchlist or watched status for a movie.
      parameters:
      - description: Movie state
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_movie.UpsertStateRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Upsert movie state
      tags:
      - movies
  /movie/discover:
    get:
      description: Browse the local movie cache with TMDB-style filters and sort.
        Each result is enriched with full TMDB detail via append_to_response.
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: popularity.desc | release_date.desc | vote_average.desc | title.asc
          | watched_at.desc | watchlisted_at.desc | ...
        in: query
        name: sort_by
        type: string
      - description: Comma-separated genre IDs (AND logic)
        in: query
        name: with_genres
        type: string
      - description: Comma-separated genre IDs to exclude
        in: query
        name: without_genres
        type: string
      - description: Filter by release year
        in: query
        name: primary_release_year
        type: integer
      - description: Release date >= (YYYY-MM-DD)
        in: query
        name: release_date.gte
        type: string
      - description: Release date <= (YYYY-MM-DD)
        in: query
        name: release_date.lte
        type: string
      - description: Vote average >=
        in: query
        name: vote_average.gte
        type: number
      - description: Vote average <=
        in: query
        name: vote_average.lte
        type: number
      - description: Vote count >=
        in: query
        name: vote_count.gte
        type: integer
      - description: ISO 639-1 language code (e.g. en, th)
        in: query
        name: with_original_language
        type: string
      - description: Include adult content (default false)
        in: query
        name: include_adult
        type: boolean
      - description: Filter by softcore flag
        in: query
        name: softcore
        type: boolean
      - description: Comma-separated provider IDs
        in: query
        name: with_watch_providers
        type: string
      - description: ISO 3166-1 country code for watch provider filter
        in: query
        name: watch_region
        type: string
      - description: watchlist | watched
        in: query
        name: with_account_status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_peera_movizius-go-service_internal_shared_response.Page-internal_movie_MovieResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Discover movies
      tags:
      - movies
  /movie/states:
    get:
      description: Returns all movie watchlist/history records for the authenticated
        user.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_peera_movizius-go-service_internal_shared_response.Page-internal_movie_MovieUser'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List movie states
      tags:
      - movies
  /notification/devices:
    post:
      consumes:
      - application/json
      description: 'Registers or updates a device FCM token for the authenticated
        user. Platform must be one of: ios, android, web.'
      parameters:
      - description: FCM token and platform
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_notification.RegisterDeviceRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Register device token
      tags:
      - notification
  /notification/test:
    post:
      description: Sends a test push notification to every device token in the collection.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_notification.TestNotificationResult'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Send test notification
      tags:
      - notification
  /tv:
    post:
      consumes:
      - application/json
      description: Set watchlist or watched status for a TV series.
      parameters:
      - description: TV state
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_tv.UpsertStateRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Upsert TV state
      tags:
      - tv
  /tv/discover:
    get:
      description: Browse the local TV cache with TMDB-style filters and sort. Each
        result is enriched with full TMDB detail via append_to_response.
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: popularity.desc | first_air_date.desc | vote_average.desc | name.asc
          | max_watched_ep.desc | max_watched_ep.asc | ...
        in: query
        name: sort_by
        type: string
