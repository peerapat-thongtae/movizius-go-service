        type: integer
      total_results:
        type: integer
    type: object
  github_com_peera_movizius-go-service_internal_shared_response.Page-internal_tv_TVState:
    properties:
      page:
        type: integer
      results:
        items:
          $ref: '#/definitions/internal_tv.TVState'
        type: array
      total_pages:
        type: integer
      total_results:
        type: integer
    type: object
  internal_health.Status:
    properties:
      status:
        type: string
    type: object
  internal_movie.MovieUser:
    properties:
      account_status:
